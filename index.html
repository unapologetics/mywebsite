document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

src: url(\"681ff429-4b69-4031-8a98-0e384a87402a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- CORE PALETTE ---------- */\n  /* Solid-Rot – the primary signal color. High saturation, younger than SPD red. */\n  --solid-red:        #E3001A;\n  --solid-red-hover:  #C60016;   /* press / hover darker */\n  --solid-red-soft:   #FF2A3E;   /* web tint, slightly lighter */\n  --solid-red-ink:    #A30012;   /* shadow / stamp */\n\n  /* Core neutrals – hard contrast, street-art DIY */\n  --ink:              #0A0A0C;   /* near-black body text & blocks */\n  --ink-deep:         #000000;   /* true black for stamps/outlines */\n  --paper:            #FFFFFF;   /* paper white */\n  --paper-off:        #F4F1EB;   /* warm off-white, like photocopy paper */\n  --concrete:         #1A1A1E;   /* slightly elevated dark */\n  --smoke:            #2A2A30;   /* borders on dark */\n\n  /* Accent colors for web / social tiles only */\n  --cyan:             #2BE6B0;  /* mint-cyan – leans green, eco / climate tiles */\n  --pink:             #C9B8FF;  /* lavender – soft violet, FLINTA / queer campaigns */\n  --acid-yellow:      #F3E600;  /* rarely used highlight */\n\n  /* ---------- SEMANTIC ---------- */\n  --bg:               var(--paper);\n  --bg-inverse:       var(--ink);\n  --bg-brand:         var(--solid-red);\n\n  --fg1:              var(--ink);           /* primary text */\n  --fg2:              #3A3A42;              /* secondary text */\n  --fg3:              #6A6A72;              /* tertiary / meta */\n  --fg-inverse:       var(--paper);\n  --fg-brand:         var(--solid-red);\n\n  --border:           var(--ink);           /* borders are BOLD and BLACK */\n  --border-hair:      #D9D5CC;              /* rare, for lists */\n  --censor-bar:       var(--ink);           /* Zensurbalken background */\n  --censor-text:      var(--paper);\n\n  --focus-ring:       var(--solid-red);\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --font-display:     'Swiss 921 BT', 'Archivo Black', 'Helvetica Neue', Impact, system-ui, sans-serif;\n  --font-shout:       'Swiss 921 BT', 'Anton', 'Oswald', Impact, sans-serif;\n  --font-body:        'Archivo', 'Helvetica Neue', Arial, system-ui, sans-serif;\n  --font-mono:        'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;\n\n  /* Type scale – big, loud, print-rooted */\n  --fs-xs:     12px;\n  --fs-sm:     14px;\n  --fs-base:   16px;\n  --fs-md:     18px;\n  --fs-lg:     22px;\n  --fs-xl:     28px;\n  --fs-2xl:    40px;\n  --fs-3xl:    56px;\n  --fs-4xl:    80px;\n  --fs-5xl:   112px;\n  --fs-6xl:   160px;\n\n  --lh-tight:  0.9;\n  --lh-snug:   1.05;\n  --lh-normal: 1.3;\n  --lh-loose:  1.55;\n\n  --tracking-display: -0.02em;\n  --tracking-caps:     0.04em;\n  --tracking-body:     0em;\n\n  /* ---------- SPACING ---------- */\n  --sp-0:  0;\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  24px;\n  --sp-6:  32px;\n  --sp-7:  48px;\n  --sp-8:  64px;\n  --sp-9:  96px;\n  --sp-10: 128px;\n\n  /* ---------- RADII ---------- */\n  /* Solid Lu is largely SQUARE. Radii are small or 0 — never pill-soft. */\n  --radius-0: 0px;\n  --radius-1: 2px;\n  --radius-2: 4px;\n  --radius-full: 999px; /* only for rare chips / tags */\n\n  /* ---------- BORDERS ---------- */\n  --border-thin:   2px solid var(--ink);\n  --border-bold:   4px solid var(--ink);\n  --border-heavy:  6px solid var(--ink);\n\n  /* ---------- SHADOWS (hard, offset — no blur) ---------- */\n  --shadow-stamp:   6px 6px 0 0 var(--ink);\n  --shadow-stamp-red: 6px 6px 0 0 var(--solid-red);\n  --shadow-poster:  10px 10px 0 0 var(--ink);\n  --shadow-soft:    0 2px 8px rgba(0,0,0,0.12); /* use rarely, for UI overlays only */\n\n  /* ---------- ROTATIONS (Diagonalen) ---------- */\n  --tilt-xs:  -1deg;\n  --tilt-sm:  -2deg;\n  --tilt-md:  -4deg;\n  --tilt-lg:  -7deg;\n  --tilt-xl:  -12deg;\n\n  /* ---------- MOTION ---------- */\n  --ease-snap:   cubic-bezier(.2, .8, .2, 1);\n  --ease-stomp:  cubic-bezier(.8, 0, .2, 1);\n  --dur-fast:    120ms;\n  --dur-med:     220ms;\n  --dur-slow:    400ms;\n}\n\n/* =========================================================\n   BASE / RESET — opinionated\n   ========================================================= */\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--bg);\n  color: var(--fg1);\n  font-family: var(--font-body);\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* =========================================================\n   TYPOGRAPHY — semantic classes\n   ========================================================= */\n\n/* Shouty display — for posters, hero headlines, stickers */\n.t-shout, .shout {\n  font-family: var(--font-shout);\n  font-weight: 400;       /* Anton only ships 400 */\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-caps);\n  line-height: var(--lh-tight);\n  font-size: var(--fs-4xl);\n}\n\n/* Display — main H1 style, Archivo Black */\nh1, .t-h1 {\n  font-family: var(--font-display);\n  font-weight: 900;\n  font-size: var(--fs-3xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-display);\n  margin: 0 0 var(--sp-5) 0;\n  text-transform: uppercase;\n}\n\nh2, .t-h2 {\n  font-family: var(--font-display);\n  font-weight: 900;\n  font-size: var(--fs-2xl);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-display);\n  margin: 0 0 var(--sp-4) 0;\n  text-transform: uppercase;\n}\n\nh3, .t-h3 {\n  font-family: var(--font-body);\n  font-weight: 800;\n  font-size: var(--fs-xl);\n  line-height: var(--lh-snug);\n  margin: 0 0 var(--sp-3) 0;\n}\n\nh4, .t-h4 {\n  font-family: var(--font-body);\n  font-weight: 700;\n  font-size: var(--fs-lg);\n  line-height: var(--lh-snug);\n  margin: 0 0 var(--sp-3) 0;\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-caps);\n}\n\np, .t-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--fs-base);\n  line-height: var(--lh-loose);\n  margin: 0 0 var(--sp-4) 0;\n}\n\n.t-lead {\n  font-family: var(--font-body);\n  font-weight: 500;\n  font-size: var(--fs-md);\n  line-height: var(--lh-loose);\n}\n\n.t-meta, small {\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: var(--fs-sm);\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  color: var(--fg3);\n}\n\ncode, kbd, .t-mono {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  background: var(--ink);\n  color: var(--paper);\n  padding: 2px 6px;\n  border-radius: var(--radius-1);\n}\n\na {\n  color: var(--solid-red);\n  font-weight: 700;\n  text-decoration: underline;\n  text-decoration-thickness: 2px;\n  text-underline-offset: 3px;\n  transition: color var(--dur-fast) var(--ease-snap);\n}\na:hover { color: var(--solid-red-hover); }\n\n/* =========================================================\n   SIGNATURE PATTERNS — use as utility classes\n   ========================================================= */\n\n/* Zensurbalken — censor bar treatment for headings */\n.censor {\n  background: var(--censor-bar);\n  color: var(--censor-text);\n  padding: 0.1em 0.35em;\n  box-decoration-break: clone;\n  -webkit-box-decoration-break: clone;\n}\n\n.censor--red {\n  background: var(--solid-red);\n  color: var(--paper);\n}\n\n/* Tilted blocks */\n.tilt-left  { transform: rotate(var(--tilt-md));  display: inline-block; }\n.tilt-right { transform: rotate(calc(-1 * var(--tilt-md))); display: inline-block; }\n.tilt-hard  { transform: rotate(var(--tilt-xl)); display: inline-block; }\n\n/* Halftone / duotone helpers */\n.duotone-red {\n  filter: grayscale(1) contrast(1.2);\n  background: var(--solid-red);\n  mix-blend-mode: multiply;\n}\n.halftone-mask {\n  -webkit-mask-image: radial-gradient(circle, #000 25%, transparent 26%);\n          mask-image: radial-gradient(circle, #000 25%, transparent 26%);\n  -webkit-mask-size: 5px 5px;\n          mask-size: 5px 5px;\n}\n\n/* Sticker — the poster/sticker box */\n.sticker {\n  background: var(--solid-red);\n  color: var(--paper);\n  padding: var(--sp-4) var(--sp-5);\n  box-shadow: var(--shadow-stamp);\n  border: var(--border-bold);\n  border-color: var(--ink);\n  display: inline-block;\n  transform: rotate(var(--tilt-sm));\n}\n<\u002Fstyle>\n\n<style>\n  html, body {\n    min-height: 100%;\n    background: var(--paper-off);\n  }\n  body {\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* Hazard-stripe top + bottom bands */\n  .hazard {\n    position: fixed;\n    left: 0;\n    right: 0;\n    height: 28px;\n    background:\n      repeating-linear-gradient(\n        135deg,\n        var(--ink) 0 22px,\n        var(--acid-yellow) 22px 44px\n      );\n    z-index: 5;\n  }\n  .hazard--top { top: 0; }\n  .hazard--bottom { bottom: 0; }\n\n  /* Halftone dot field behind everything */\n  .dots {\n    position: fixed;\n    inset: 28px 0;\n    background-image: radial-gradient(var(--ink) 1.4px, transparent 1.6px);\n    background-size: 22px 22px;\n    background-position: 0 0;\n    opacity: 0.08;\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  .stage {\n    position: relative;\n    z-index: 2;\n    flex: 1;\n    display: grid;\n    place-items: center;\n    padding: 110px 32px 130px;\n    box-sizing: border-box;\n  }\n\n  .poster {\n    position: relative;\n    width: min(1080px, 100%);\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: var(--sp-6);\n  }\n\n  /* Tiny corner brand mark */\n  .brand {\n    position: fixed;\n    top: 52px;\n    left: 32px;\n    z-index: 6;\n    display: flex;\n    align-items: center;\n    gap: var(--sp-3);\n  }\n  .brand__dot {\n    width: 14px;\n    height: 14px;\n    background: var(--solid-red);\n    box-shadow: 3px 3px 0 0 var(--ink);\n  }\n  .brand__name {\n    font-family: var(--font-body);\n    font-weight: 800;\n    font-size: var(--fs-sm);\n    letter-spacing: var(--tracking-caps);\n    text-transform: uppercase;\n  }\n\n  .status {\n    position: fixed;\n    top: 52px;\n    right: 32px;\n    z-index: 6;\n    font-family: var(--font-mono);\n    font-size: var(--fs-xs);\n    color: var(--fg2);\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .status__led {\n    width: 10px;\n    height: 10px;\n    border-radius: 50%;\n    background: var(--solid-red);\n    box-shadow: 0 0 0 3px rgba(227,0,26,0.18);\n    animation: blink 1.4s steps(2, end) infinite;\n  }\n  @keyframes blink {\n    50% { opacity: 0.25; }\n  }\n\n  /* Headline */\n  .shout {\n    font-family: var(--font-shout);\n    text-transform: uppercase;\n    line-height: 0.84;\n    letter-spacing: -0.01em;\n    margin: 0;\n    color: var(--ink);\n  }\n  .shout__row {\n    display: block;\n    font-size: clamp(60px, 13vw, 168px);\n  }\n  .shout__row--red { color: var(--solid-red); }\n  .shout__row--censor {\n    background: var(--ink);\n    color: var(--paper);\n    padding: 0.02em 0.18em;\n    display: inline-block;\n    transform: rotate(-1.5deg);\n  }\n\n  /* Sub-row with meta + sticker on one line */\n  .meta-row {\n    display: flex;\n    flex-wrap: wrap;\n    align-items: flex-end;\n    justify-content: space-between;\n    gap: var(--sp-5);\n    margin-top: var(--sp-4);\n  }\n  .lede {\n    font-family: var(--font-body);\n    font-weight: 500;\n    font-size: var(--fs-md);\n    line-height: 1.4;\n    max-width: 38ch;\n    color: var(--fg1);\n    margin: 0;\n  }\n  .lede strong {\n    background: var(--acid-yellow);\n    padding: 0 4px;\n    font-weight: 800;\n  }\n\n  /* Tilted sticker with email */\n  .sticker-card {\n    position: relative;\n    background: var(--solid-red);\n    color: var(--paper);\n    border: var(--border-bold);\n    box-shadow: var(--shadow-poster);\n    padding: 18px 26px 20px 26px;\n    transform: rotate(-3deg);\n    transition: transform var(--dur-med) var(--ease-snap),\n                box-shadow var(--dur-med) var(--ease-snap);\n    text-decoration: none;\n    display: inline-block;\n  }\n  .sticker-card:hover {\n    transform: rotate(-1deg) translate(-2px, -2px);\n    box-shadow: 14px 14px 0 0 var(--ink);\n  }\n  .sticker-card:active {\n    transform: rotate(-3deg) translate(4px, 4px);\n    box-shadow: 2px 2px 0 0 var(--ink);\n  }\n  .sticker-card__label {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    opacity: 0.85;\n    margin-bottom: 4px;\n  }\n  .sticker-card__email {\n    font-family: var(--font-shout);\n    font-size: clamp(28px, 3.4vw, 44px);\n    line-height: 1;\n    text-transform: lowercase;\n    letter-spacing: -0.01em;\n    color: var(--paper);\n    text-decoration: none;\n    display: block;\n  }\n  .sticker-card__arrow {\n    display: inline-block;\n    margin-left: 6px;\n    transition: transform var(--dur-med) var(--ease-snap);\n  }\n  .sticker-card:hover .sticker-card__arrow {\n    transform: translateX(6px);\n  }\n\n  /* Stamp ribbon under headline */\n  .ribbon {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    background: var(--ink);\n    color: var(--paper);\n    padding: 6px 14px;\n    font-family: var(--font-mono);\n    font-size: var(--fs-xs);\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    transform: rotate(-1deg);\n    align-self: flex-start;\n    width: max-content;\n  }\n  .ribbon__bullet {\n    width: 8px;\n    height: 8px;\n    background: var(--solid-red);\n  }\n\n  /* Bottom signature */\n  .sig {\n    position: relative;\n    z-index: 6;\n    margin: 0 32px;\n    padding: 18px 0 44px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    gap: 16px;\n    font-family: var(--font-mono);\n    font-size: var(--fs-xs);\n    color: var(--fg2);\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n  }\n\n  @media (max-width: 720px) {\n    .brand, .status { top: 42px; }\n    .sig { padding: 12px 0 30px; font-size: 10px; gap: 12px; margin: 0 22px; }\n    .stage { padding: 90px 22px 24px; }\n    .shout__row { font-size: clamp(48px, 16vw, 110px); }\n    .meta-row { flex-direction: column; align-items: flex-start; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <div class=\"hazard hazard--top\"><\u002Fdiv>\n\n  <header class=\"brand\">\n    <span class=\"brand__dot\"><\u002Fspan>\n    <span class=\"brand__name\">Sarah Lukic / Design<\u002Fspan>\n  <\u002Fheader>\n\n  <div class=\"status\">\n    <span class=\"status__led\"><\u002Fspan>\n    <span>status: under construction<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"dots\"><\u002Fdiv>\n\n  <main class=\"stage\">\n    <div class=\"poster\">\n\n      <span class=\"ribbon\">\n        <span class=\"ribbon__bullet\"><\u002Fspan>\n        <span>Hier entsteht was — kommt bald<\u002Fspan>\n      <\u002Fspan>\n\n      <h1 class=\"shout\">\n        <span class=\"shout__row shout__row--red\">Baustelle.<\u002Fspan>\n        <span class=\"shout__row\"><span class=\"shout__row--censor\">Website<\u002Fspan> kommt.<\u002Fspan>\n      <\u002Fh1>\n\n      <div class=\"meta-row\">\n        <p class=\"lede\">\n          Bis dahin: <strong>schreib mir.<\u002Fstrong> Projektanfragen, Kollaborationen,\n          oder einfach Hallo sagen — alles willkommen.\n        <\u002Fp>\n\n        <a class=\"sticker-card\" href=\"mailto:info@lukic.design\">\n          <div class=\"sticker-card__label\">→ Kontakt / E-Mail<\u002Fdiv>\n          <span class=\"sticker-card__email\">\n            info@lukic.design<span class=\"sticker-card__arrow\">↗<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <footer class=\"sig\">\n    <span>© 2026 — Sarah Lukic<\u002Fspan>\n    <span>Dachau / München<\u002Fspan>\n  <\u002Ffooter>\n\n  <div class=\"hazard hazard--bottom\"><\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
